<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">
                🌙
            </button>
            <h1>로또 번호 추첨기</h1>
            <p>행운의 6개 번호를 확인하세요!</p>
        </header>

        <main>
            <div id="ball-container" class="ball-container">
                <!-- 로또 공이 여기에 생성됩니다 -->
                <div class="placeholder-text">행운을 빕니다!</div>
            </div>

            <div class="controls">
                <button id="draw-btn" class="btn btn-primary">추첨하기</button>
                <button id="reset-btn" class="btn btn-secondary">초기화</button>
            </div>
        </main>

        <section class="history-section">
            <h2>최근 추첨 이력</h2>
            <ul id="history-list">
                <!-- 이전 기록들이 여기에 추가됩니다 -->
            </ul>
        </section>

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xykvvdoq" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">문의 보내기</button>
            </form>
        </section>

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilderlecture-2.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
